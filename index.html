<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Flow Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-not-started { border-left: 6px solid #9ca3af; }
        .status-validating { border-left: 6px solid #f59e0b; }
        .status-uploading { border-left: 6px solid #3b82f6; }
        .status-uploaded { border-left: 6px solid #10b981; }
        
        /* Smooth transitions for the progress bar */
        .progress-transition { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div class="max-w-5xl mx-auto p-4 md:p-10">
        <header class="flex justify-between items-start mb-8">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight text-slate-800">File Flow</h1>
                <p class="text-slate-500 mt-1">Track your progress and stay organized.</p>
            </div>
            <button onclick="resetApp()" class="text-xs font-semibold uppercase tracking-wider text-red-500 hover:text-red-700 bg-red-50 px-3 py-2 rounded-lg transition-colors">
                Reset Project
            </button>
        </header>

        <div id="setupView" class="bg-white border border-slate-200 rounded-2xl p-8 shadow-xl max-w-md mx-auto text-center hidden">
            <div class="mb-6">
                <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d=" activism 12h8m-8 0H4m8 0V4m0 16v-8" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold">Start New Project</h2>
                <p class="text-slate-500">How many files are we working with today?</p>
            </div>
            <input type="number" id="fileInputCount" value="10" min="1" max="1000" 
                class="w-full text-center text-2xl font-bold p-3 border-2 border-slate-200 rounded-xl mb-6 focus:border-blue-500 outline-none transition-all">
            <button onclick="initializeProject()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition-all">
                Generate Tracker
            </button>
        </div>

        <div id="appView" class="hidden">
            <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm mb-8">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-sm font-bold text-slate-500 uppercase tracking-widest">Overall Completion</span>
                    <span id="progressText" class="text-3xl font-black text-blue-600">0%</span>
                </div>
                <div class="w-full bg-slate-100 h-4 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-blue-600 progress-transition shadow-[0_0_15px_rgba(59,130,246,0.5)]" style="width: 0%"></div>
                </div>
            </div>

            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                    <p class="text-xs font-bold text-slate-400 uppercase">Not Started</p>
                    <p id="stat-not-started" class="text-3xl font-bold text-slate-400">0</p>
                </div>
                <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                    <p class="text-xs font-bold text-amber-500 uppercase">Validating</p>
                    <p id="stat-validating" class="text-3xl font-bold text-amber-500">0</p>
                </div>
                <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                    <p class="text-xs font-bold text-blue-500 uppercase">Uploading</p>
                    <p id="stat-uploading" class="text-3xl font-bold text-blue-500">0</p>
                </div>
                <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                    <p class="text-xs font-bold text-emerald-500 uppercase">Uploaded</p>
                    <p id="stat-uploaded" class="text-3xl font-bold text-emerald-500">0</p>
                </div>
            </div>

            <div class="mb-4 flex gap-4">
                <input type="text" id="searchInput" oninput="renderList()" placeholder="Search files..." 
                    class="flex-1 p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div id="fileListContainer" class="space-y-3">
                </div>
        </div>
    </div>

    <script>
        let state = {
            files: [],
            total: 0
        };

        // Load data on start
        window.onload = () => {
            const saved = localStorage.getItem('fileFlowState');
            if (saved) {
                state = JSON.parse(saved);
                showApp();
            } else {
                showSetup();
            }
        };

        function showSetup() {
            document.getElementById('setupView').classList.remove('hidden');
            document.getElementById('appView').classList.add('hidden');
        }

        function showApp() {
            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('appView').classList.remove('hidden');
            renderList();
        }

        function initializeProject() {
            const count = parseInt(document.getElementById('fileInputCount').value);
            if (isNaN(count) || count < 1) return;

            state.total = count;
            state.files = Array.from({ length: count }, (_, i) => ({
                id: i + 1,
                name: `File_${String(i + 1).padStart(3, '0')}`,
                status: 'not-started'
            }));
            
            saveAndRender();
            showApp();
        }

        function saveAndRender() {
            localStorage.setItem('fileFlowState', JSON.stringify(state));
            renderList();
        }

        function updateStatus(id, newStatus) {
            const file = state.files.find(f => f.id === id);
            if (file) {
                file.status = newStatus;
                saveAndRender();
            }
        }

        function updateName(id, newName) {
            const file = state.files.find(f => f.id === id);
            if (file) {
                file.name = newName;
                localStorage.setItem('fileFlowState', JSON.stringify(state));
            }
        }

        function renderList() {
            const container = document.getElementById('fileListContainer');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = '';

            let uploadedCount = 0;
            const stats = { 'not-started': 0, 'validating': 0, 'uploading': 0, 'uploaded': 0 };

            state.files.forEach(file => {
                stats[file.status]++;
                if (file.status === 'uploaded') uploadedCount++;

                // Filter logic
                if (file.name.toLowerCase().includes(searchTerm)) {
                    const row = document.createElement('div');
                    row.className = `bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-wrap items-center justify-between gap-4 transition-all status-${file.status}`;
                    
                    row.innerHTML = `
                        <div class="flex items-center gap-4">
                            <span class="text-[10px] font-bold text-slate-300 font-mono">#${file.id}</span>
                            <input type="text" value="${file.name}" onchange="updateName(${file.id}, this.value)"
                                class="font-semibold text-slate-700 bg-transparent border-b-2 border-transparent hover:border-slate-200 focus:border-blue-500 outline-none transition-all">
                        </div>
                        <div class="flex flex-wrap gap-1">
                            ${['not-started', 'validating', 'uploading', 'uploaded'].map(status => `
                                <button onclick="updateStatus(${file.id}, '${status}')" 
                                    class="px-3 py-1.5 text-[10px] font-black uppercase tracking-tighter rounded-md border-2 transition-all
                                    ${file.status === status ? getActiveBtnClass(status) : 'border-slate-100 text-slate-400 hover:bg-slate-50'}">
                                    ${status.replace('-', ' ')}
                                </button>
                            `).join('')}
                        </div>
                    `;
                    container.appendChild(row);
                }
            });

            // Update UI components
            updateStatsUI(stats, uploadedCount);
        }

        function getActiveBtnClass(status) {
            switch(status) {
                case 'not-started': return 'bg-slate-500 border-slate-500 text-white';
                case 'validating': return 'bg-amber-500 border-amber-500 text-white';
                case 'uploading': return 'bg-blue-500 border-blue-500 text-white';
                case 'uploaded': return 'bg-emerald-500 border-emerald-500 text-white';
            }
        }

        function updateStatsUI(stats, uploadedCount) {
            // Update counts
            for (const key in stats) {
                document.getElementById(`stat-${key}`).innerText = stats[key];
            }

            // Update Progress Bar
            const percent = Math.round((uploadedCount / state.total) * 100) || 0;
            const bar = document.getElementById('progressBar');
            const text = document.getElementById('progressText');
            
            bar.style.width = percent + '%';
            text.innerText = percent + '%';

            // Change progress bar color if finished
            if (percent === 100) {
                bar.classList.replace('bg-blue-600', 'bg-emerald-500');
                text.classList.replace('text-blue-600', 'text-emerald-500');
            } else {
                bar.classList.add('bg-blue-600');
                text.classList.add('text-blue-600');
            }
        }

        function resetApp() {
            if (confirm("Reset everything? This will clear all file data and names.")) {
                localStorage.removeItem('fileFlowState');
                location.reload();
            }
        }
    </script>
</body>
</html>
