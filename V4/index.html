<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Flow | Premium Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'] 
                    },
                }
            }
        }
    </script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .dark .glass-panel { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        
        /* Premium custom select styling */
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        select option { background-color: #ffffff; color: #1d1d1f; font-weight: 500; }
        .dark select option { background-color: #1e293b; color: #f5f5f7; }
        
        /* Smooth transitions for text */
        .name-transition { transition: color 0.3s ease, text-decoration-color 0.3s ease; }
    </style>
</head>
<body class="bg-[#f5f5f7] dark:bg-[#000000] text-[#1d1d1f] dark:text-[#f5f5f7] min-h-screen selection:bg-blue-500/30 antialiased">

    <div class="max-w-4xl mx-auto p-4 md:p-10 pb-20">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold tracking-tight">FILEFLOW</h1>
                <p class="text-[11px] font-medium text-slate-500 uppercase tracking-widest mt-1">Current Workspace</p>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm flex items-center justify-center transition-transform hover:scale-105 active:scale-95">
                    <span id="theme-icon" class="text-sm">🌙</span>
                </button>
                <button onclick="exportData()" class="px-5 py-2 bg-blue-600 text-white rounded-full font-semibold text-sm hover:bg-blue-700 shadow-sm transition-transform hover:scale-105 active:scale-95">
                    Export
                </button>
            </div>
        </header>

        <div id="setupView" class="glass-panel rounded-3xl p-8 md:p-10 border border-white dark:border-slate-800 shadow-[0_8px_30px_rgb(0,0,0,0.04)] mb-10 hidden">
            <h2 class="text-xl font-semibold mb-6">Initialize Batch Range</h2>
            <div class="grid grid-cols-2 gap-6 mb-8">
                <div>
                    <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-2">From File No.</label>
                    <div class="relative">
                        <select id="rangeStart" class="w-full bg-slate-100/80 dark:bg-slate-900/50 p-4 rounded-2xl border border-transparent focus:border-blue-500 focus:ring-4 ring-blue-500/10 outline-none font-mono text-xl transition-all cursor-pointer pr-10">
                            </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-2">To File No.</label>
                    <div class="relative">
                        <select id="rangeEnd" class="w-full bg-slate-100/80 dark:bg-slate-900/50 p-4 rounded-2xl border border-transparent focus:border-blue-500 focus:ring-4 ring-blue-500/10 outline-none font-mono text-xl transition-all cursor-pointer pr-10">
                            </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>
            </div>
            <button onclick="initializeProject()" class="w-full py-4 bg-[#1d1d1f] dark:bg-white dark:text-[#1d1d1f] text-white rounded-2xl font-semibold hover:opacity-90 transition-all active:scale-[0.98] shadow-md">
                Generate Sequence
            </button>
        </div>

        <div id="appView" class="hidden space-y-6">
            <div class="glass-panel rounded-3xl p-8 border border-white/50 dark:border-slate-800 shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
                <div class="flex justify-between items-end mb-6">
                    <div class="space-y-1">
                        <span id="progressText" class="text-5xl font-semibold tracking-tight text-blue-500">0%</span>
                        <p class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Global Completion</p>
                    </div>
                    <div class="text-right hidden md:block">
                        <p class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-2">Avg Lead Times</p>
                        <div class="flex gap-4 text-sm font-mono font-medium bg-slate-50 dark:bg-slate-800/50 px-4 py-2 rounded-xl">
                            <div class="text-amber-500">VAL: <span id="avg-val">0s</span></div>
                            <div class="text-blue-500">UP: <span id="avg-up">0s</span></div>
                        </div>
                    </div>
                </div>
                <div class="w-full bg-slate-200/50 dark:bg-slate-800/50 h-3 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-blue-500 transition-all duration-1000 ease-out" style="width: 0%"></div>
                </div>
                <div class="md:hidden flex justify-between mt-6 pt-4 border-t border-slate-200 dark:border-slate-800 font-mono text-[11px] font-medium text-slate-500">
                    <span>VAL: <b id="avg-val-m" class="text-amber-500">0s</b></span>
                    <span>UP: <b id="avg-up-m" class="text-blue-500">0s</b></span>
                </div>
            </div>

            <div class="relative">
                <svg class="w-5 h-5 absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="searchInput" oninput="renderList()" placeholder="Search files..." 
                    class="w-full bg-white dark:bg-slate-900 py-4 pl-12 pr-4 rounded-2xl border border-slate-200 dark:border-slate-800 focus:ring-4 ring-blue-500/10 focus:border-blue-500 outline-none shadow-sm transition-all text-sm font-medium">
            </div>

            <div id="fileListContainer" class="space-y-3"></div>

            <button onclick="resetApp()" class="w-full py-4 text-[13px] font-semibold text-red-500 hover:bg-red-50 dark:hover:bg-red-950/20 rounded-2xl transition-colors mt-6">
                Wipe Current Batch Data
            </button>
        </div>

        <footer class="mt-20 pt-10 border-t border-slate-200 dark:border-slate-800">
            <h3 class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-5 text-center md:text-left">Version Archive</h3>
            <div class="flex flex-wrap justify-center md:justify-start gap-3">
                <a href="https://umullick.in/File_Status/V1/" class="px-4 py-2 bg-white dark:bg-slate-900 rounded-full border border-slate-200 dark:border-slate-800 text-xs font-medium text-slate-500 hover:text-blue-500 hover:border-blue-500 transition-all shadow-sm hover:shadow-md">
                    V1 Basic
                </a>
                <a href="https://umullick.in/File_Status/V2/" class="px-4 py-2 bg-white dark:bg-slate-900 rounded-full border border-slate-200 dark:border-slate-800 text-xs font-medium text-slate-500 hover:text-blue-500 hover:border-blue-500 transition-all shadow-sm hover:shadow-md">
                    V2 Analytics
                </a>
                <a href="https://umullick.in/File_Status/V3/" class="px-4 py-2 bg-white dark:bg-slate-900 rounded-full border border-slate-200 dark:border-slate-800 text-xs font-medium text-slate-500 hover:text-blue-500 hover:border-blue-500 transition-all shadow-sm hover:shadow-md">
                    V3 Pro
                </a>
                <a href="https://umullick.in/File_Status/V4/" class="px-4 py-2 bg-white dark:bg-slate-900 rounded-full border border-slate-200 dark:border-slate-800 text-xs font-medium text-slate-500 hover:text-blue-500 hover:border-blue-500 transition-all shadow-sm hover:shadow-md">
                    V4 Timeline
                </a>
                <div class="px-4 py-2 bg-blue-50 dark:bg-blue-900/30 rounded-full border border-blue-200 dark:border-blue-800 text-xs font-semibold text-blue-600 shadow-sm">
                    Current Version
                </div>
            </div>
        </footer>
    </div>

    <script>
        let state = { files: [], total: 0 };
        const statuses = ['validate-start', 'validated', 'upload-start', 'upload-completed'];

        window.onload = () => {
            // Theme Logic
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').innerText = '☀️';
            }
            
            populateDropdowns();

            // Load Data
            const saved = localStorage.getItem('fileFlowCurrent_v8');
            if (saved) {
                state = JSON.parse(saved);
                showApp();
            } else {
                showSetup();
            }
        };

        function populateDropdowns() {
            const startSelect = document.getElementById('rangeStart');
            const endSelect = document.getElementById('rangeEnd');
            
            for (let i = 0; i <= 1000; i++) {
                startSelect.add(new Option(i, i));
                endSelect.add(new Option(i, i));
            }
            startSelect.value = "0";
            endSelect.value = "10";
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
            document.getElementById('theme-icon').innerText = isDark ? '☀️' : '🌙';
        }

        function showSetup() {
            document.getElementById('setupView').classList.remove('hidden');
            document.getElementById('appView').classList.add('hidden');
        }

        function showApp() {
            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('appView').classList.remove('hidden');
            renderList();
        }

        function initializeProject() {
            const start = parseInt(document.getElementById('rangeStart').value);
            const end = parseInt(document.getElementById('rangeEnd').value);
            
            if (isNaN(start) || isNaN(end) || end < start) {
                alert("Invalid range. 'To File No.' must be greater than or equal to 'From File No.'.");
                return;
            }

            state.total = (end - start) + 1;
            state.files = [];
            for(let i = start; i <= end; i++) {
                state.files.push({
                    id: i,
                    name: `File_${String(i).padStart(3, '0')}`,
                    status: 'validate-start',
                    t_val_start: null, t_val_end: null,
                    t_up_start: null, t_up_end: null,
                    dur_val: 0, dur_up: 0
                });
            }
            saveAndRender();
            showApp();
        }

        function updateStatus(id, newStatus) {
            const file = state.files.find(f => f.id === id);
            if (!file) return;
            const now = Date.now();
            
            if (newStatus === 'validate-start') file.t_val_start = now;
            else if (newStatus === 'validated') {
                file.t_val_end = now;
                if (file.t_val_start) file.dur_val = now - file.t_val_start;
            } else if (newStatus === 'upload-start') {
                file.t_up_start = now;
            } else if (newStatus === 'upload-completed') {
                file.t_up_end = now;
                if (file.t_up_start) file.dur_up = now - file.t_up_start;
            }
            
            file.status = newStatus;
            saveAndRender();
        }

        function formatStatusText(s) {
            return s.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
        }

        function renderList() {
            const container = document.getElementById('fileListContainer');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = '';

            let totalVal = 0, vCount = 0, totalUp = 0, uCount = 0, done = 0;

            state.files.forEach(file => {
                const isCompleted = file.status === 'upload-completed';
                if (isCompleted) done++;
                if (file.dur_val > 0) { totalVal += file.dur_val; vCount++; }
                if (file.dur_up > 0) { totalUp += file.dur_up; uCount++; }

                if (file.name.toLowerCase().includes(searchTerm)) {
                    const row = document.createElement('div');
                    row.className = `bg-white dark:bg-[#151516] p-4 md:p-5 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-sm flex flex-row items-center justify-between gap-4 transition-all duration-300 hover:shadow-md`;
                    
                    // Strike-through and color logic
                    const nameClass = isCompleted 
                        ? 'font-semibold text-[15px] text-emerald-500 line-through decoration-emerald-500/50 opacity-80 name-transition'
                        : 'font-semibold text-[15px] text-slate-900 dark:text-slate-100 name-transition';

                    row.innerHTML = `
                        <div class="flex items-center">
                            <span class="${nameClass}">${file.name}</span>
                        </div>
                        
                        <div class="relative min-w-[160px] md:min-w-[180px]">
                            <select onchange="updateStatus(${file.id}, this.value)" 
                                class="${getDropdownStyle(file.status)} w-full appearance-none pr-8 pl-4 py-2.5 rounded-xl text-[12px] md:text-[13px] font-semibold outline-none transition-all cursor-pointer border shadow-sm">
                                ${statuses.map(s => `
                                    <option value="${s}" ${file.status === s ? 'selected' : ''}>
                                        ${formatStatusText(s)}
                                    </option>
                                `).join('')}
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 ${getIconColor(file.status)}">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    `;
                    container.appendChild(row);
                }
            });

            const valStr = vCount > 0 ? (totalVal/vCount/1000).toFixed(1) + 's' : '0s';
            const upStr = uCount > 0 ? (totalUp/uCount/1000).toFixed(1) + 's' : '0s';
            
            document.getElementById('avg-val').innerText = valStr;
            document.getElementById('avg-val-m').innerText = valStr;
            document.getElementById('avg-up').innerText = upStr;
            document.getElementById('avg-up-m').innerText = upStr;

            const percent = Math.round((done / state.total) * 100) || 0;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').innerText = percent + '%';
            
            // Turn progress text green when done
            if(percent === 100) {
                document.getElementById('progressText').classList.replace('text-blue-500', 'text-emerald-500');
                document.getElementById('progressBar').classList.replace('bg-blue-500', 'bg-emerald-500');
            } else {
                document.getElementById('progressText').classList.replace('text-emerald-500', 'text-blue-500');
                document.getElementById('progressBar').classList.replace('bg-emerald-500', 'bg-blue-500');
            }
        }

        // Distinct coloring for the dropdown boxes
        function getDropdownStyle(s) {
            if (s === 'validate-start') return 'bg-white dark:bg-slate-800 text-amber-600 border-amber-200 dark:border-slate-700 hover:border-amber-400';
            if (s === 'validated') return 'bg-amber-500 text-white border-transparent hover:bg-amber-600';
            if (s === 'upload-start') return 'bg-white dark:bg-slate-800 text-blue-600 border-blue-200 dark:border-slate-700 hover:border-blue-400';
            if (s === 'upload-completed') return 'bg-emerald-500 text-white border-transparent hover:bg-emerald-600';
        }

        // Ensure the dropdown arrow matches the text color
        function getIconColor(s) {
            if (s === 'validated' || s === 'upload-completed') return 'text-white opacity-90';
            if (s === 'validate-start') return 'text-amber-500';
            if (s === 'upload-start') return 'text-blue-500';
        }

        function saveAndRender() {
            localStorage.setItem('fileFlowCurrent_v8', JSON.stringify(state));
            renderList();
        }

        function exportData() {
            let csv = "Name,Status,Val_Time_Sec,Up_Time_Sec\n";
            state.files.forEach(f => csv += `${f.id},${f.name},${f.status},${(f.dur_val/1000).toFixed(2)},${(f.dur_up/1000).toFixed(2)}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `Batch_Report_${Date.now()}.csv`; a.click();
        }

        function resetApp() {
            if (confirm("Reset current sequence?")) {
                localStorage.removeItem('fileFlowCurrent_v8');
                location.reload();
            }
        }
    </script>
</body>
</html>
