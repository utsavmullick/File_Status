<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Flow | Animated Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'] 
                    },
                }
            }
        }
    </script>
    <style>
        /* The shader background container */
        #shader-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: #000; overflow: hidden; }
        
        /* Adjusted glass panels to look good over the moving background */
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.4); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.1); }
        
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        select option { background-color: #ffffff; color: #1d1d1f; font-weight: 500; }
        .dark select option { background-color: #1e293b; color: #f5f5f7; }
        .name-transition { transition: color 0.3s ease, text-decoration-color 0.3s ease; }
        .pulse-red { animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { color: #ef4444; } 50% { color: #991b1b; } 100% { color: #ef4444; } }
    </style>
</head>
<body class="bg-transparent text-[#1d1d1f] dark:text-[#f5f5f7] min-h-screen selection:bg-blue-500/30 antialiased">

    <div id="shader-bg"></div>

    <div class="max-w-5xl mx-auto p-4 md:p-10 pb-20 relative z-10">
        <header class="flex flex-wrap justify-between items-center gap-4 mb-10">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-white dark:text-white drop-shadow-md">FILEFLOW</h1>
                <p class="text-[11px] font-bold text-slate-200 uppercase tracking-widest mt-1 drop-shadow-md">Time Critical Workspace</p>
            </div>
            <div class="flex flex-wrap gap-3 items-center">
                <span id="copyToast" class="text-xs font-bold text-emerald-400 opacity-0 transition-opacity">Copied!</span>
                <button onclick="copyData()" class="px-4 py-2 glass-panel rounded-full font-semibold text-sm hover:scale-105 shadow-sm transition-transform active:scale-95 text-slate-900 dark:text-white">
                    Copy Data
                </button>
                <button onclick="exportData()" class="px-5 py-2 bg-blue-600/90 backdrop-blur-md text-white rounded-full font-semibold text-sm hover:bg-blue-700 shadow-sm transition-transform active:scale-95">
                    Export CSV
                </button>
                <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-full glass-panel shadow-sm flex items-center justify-center transition-transform hover:scale-105 active:scale-95">
                    <span id="theme-icon" class="text-sm">🌙</span>
                </button>
            </div>
        </header>

        <div id="setupView" class="glass-panel rounded-3xl p-8 md:p-10 shadow-2xl mb-10 hidden">
            <h2 class="text-xl font-semibold mb-6">Initialize Batch & Deadline</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-300 uppercase tracking-wider mb-2">From File No.</label>
                    <div class="relative">
                        <select id="rangeStart" class="w-full bg-white/50 dark:bg-slate-900/50 p-4 rounded-2xl border border-transparent focus:border-blue-500 focus:ring-4 ring-blue-500/20 outline-none font-mono text-xl transition-all cursor-pointer pr-10"></select>
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-300 uppercase tracking-wider mb-2">To File No.</label>
                    <div class="relative">
                        <select id="rangeEnd" class="w-full bg-white/50 dark:bg-slate-900/50 p-4 rounded-2xl border border-transparent focus:border-blue-500 focus:ring-4 ring-blue-500/20 outline-none font-mono text-xl transition-all cursor-pointer pr-10"></select>
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-300 uppercase tracking-wider mb-2">Target Deadline</label>
                    <input type="time" id="deadlineTime" class="w-full bg-white/50 dark:bg-slate-900/50 p-4 rounded-2xl border border-transparent focus:border-blue-500 focus:ring-4 ring-blue-500/20 outline-none font-mono text-xl transition-all cursor-pointer">
                </div>
            </div>
            <button onclick="initializeProject()" class="w-full py-4 bg-[#1d1d1f] dark:bg-white dark:text-[#1d1d1f] text-white rounded-2xl font-bold hover:opacity-90 transition-all active:scale-[0.98] shadow-xl">
                Lock in Deadline & Generate
            </button>
        </div>

        <div id="appView" class="hidden space-y-6">
            
            <div id="deadlineBanner" class="glass-panel text-slate-900 dark:text-white rounded-2xl p-4 flex justify-between items-center shadow-lg transition-colors duration-500">
                <div class="flex items-center gap-3">
                    <svg class="w-6 h-6 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span class="text-sm font-semibold uppercase tracking-wider opacity-80">Time Remaining</span>
                </div>
                <div id="countdownDisplay" class="text-3xl font-mono font-bold tracking-tighter">--:--:--</div>
            </div>

            <div class="glass-panel rounded-3xl p-8 shadow-xl">
                <div class="flex justify-between items-end mb-6">
                    <div class="space-y-1">
                        <span id="progressText" class="text-5xl font-bold tracking-tight text-blue-600 dark:text-blue-400">0%</span>
                        <p class="text-[11px] font-bold text-slate-500 dark:text-slate-300 uppercase tracking-wider">Global Completion</p>
                    </div>
                    <div class="text-right hidden md:block">
                        <p class="text-[11px] font-bold text-slate-500 dark:text-slate-300 uppercase tracking-wider mb-2">Avg Lead Times</p>
                        <div class="flex gap-4 text-sm font-mono font-bold bg-white/50 dark:bg-slate-900/50 px-4 py-2 rounded-xl">
                            <div class="text-amber-600 dark:text-amber-400">VAL: <span id="avg-val">0s</span></div>
                            <div class="text-blue-600 dark:text-blue-400">UP: <span id="avg-up">0s</span></div>
                        </div>
                    </div>
                </div>
                <div class="w-full bg-white/30 dark:bg-slate-900/50 h-3 rounded-full overflow-hidden backdrop-blur-md">
                    <div id="progressBar" class="h-full bg-blue-500 transition-all duration-1000 ease-out" style="width: 0%"></div>
                </div>
            </div>

            <div class="relative">
                <input type="text" id="searchInput" oninput="renderList()" placeholder="Search files..." 
                    class="w-full glass-panel py-4 pl-12 pr-4 rounded-2xl focus:ring-4 ring-blue-500/20 outline-none shadow-lg transition-all text-sm font-semibold placeholder-slate-500 dark:placeholder-slate-400">
            </div>

            <div id="fileListContainer" class="space-y-3"></div>

            <button onclick="resetApp()" class="w-full py-4 text-[13px] font-bold text-red-500 bg-red-500/10 hover:bg-red-500/20 rounded-2xl transition-colors mt-6 backdrop-blur-md border border-red-500/20">
                Wipe Current Batch Data
            </button>
        </div>
    </div>

    <script>
        // --- THREE.JS SHADER ANIMATION INTEGRATION ---
        function initShaderAnimation() {
            const container = document.getElementById('shader-bg');
            
            const vertexShader = `
                void main() {
                    gl_Position = vec4( position, 1.0 );
                }
            `;

            const fragmentShader = `
                #define TWO_PI 6.2831853072
                #define PI 3.14159265359
                precision highp float;
                uniform vec2 resolution;
                uniform float time;

                void main(void) {
                    vec2 uv = (gl_FragCoord.xy * 2.0 - resolution.xy) / min(resolution.x, resolution.y);
                    float t = time*0.05;
                    float lineWidth = 0.002;
                    vec3 color = vec3(0.0);
                    
                    for(int j = 0; j < 3; j++){
                        for(int i=0; i < 5; i++){
                            color[j] += lineWidth*float(i*i) / abs(fract(t - 0.01*float(j)+float(i)*0.01)*5.0 - length(uv) + mod(uv.x+uv.y, 0.2));
                        }
                    }
                    gl_FragColor = vec4(color[0],color[1],color[2],1.0);
                }
            `;

            const camera = new THREE.Camera();
            camera.position.z = 1;
            const scene = new THREE.Scene();
            const geometry = new THREE.PlaneGeometry(2, 2);

            const uniforms = {
                time: { type: "f", value: 1.0 },
                resolution: { type: "v2", value: new THREE.Vector2() },
            };

            const material = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
            });

            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            const onWindowResize = () => {
                const width = window.innerWidth;
                const height = window.innerHeight;
                renderer.setSize(width, height);
                uniforms.resolution.value.x = renderer.domElement.width;
                uniforms.resolution.value.y = renderer.domElement.height;
            };

            onWindowResize();
            window.addEventListener("resize", onWindowResize, false);

            const animate = () => {
                requestAnimationFrame(animate);
                uniforms.time.value += 0.05;
                renderer.render(scene, camera);
            };
            animate();
        }

        // Initialize Shader immediately
        initShaderAnimation();

        // --- CORE APPLICATION LOGIC (V10 Features) ---
        let state = { files: [], total: 0, deadline: null, warningsTriggered: { m30: false, m15: false, m5: false, m1: false } };
        const statuses = ['not-yet', 'validate-start', 'validated', 'upload-start', 'upload-completed'];
        let timerInterval;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        window.onload = () => {
            document.documentElement.classList.add('dark'); // Force dark mode for shader visibility
            populateDropdowns();

            const saved = localStorage.getItem('fileFlowCurrent_v11');
            if (saved) {
                state = JSON.parse(saved);
                if(state.deadline) startTimer();
                showApp();
            } else {
                const now = new Date();
                now.setHours(now.getHours() + 1);
                document.getElementById('deadlineTime').value = now.toTimeString().slice(0,5);
                showSetup();
            }
        };

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'success') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'warning') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.setValueAtTime(0, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime + 0.2);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateClock, 1000);
            updateClock();
        }

        function updateClock() {
            if(!state.deadline) return;
            const now = Date.now();
            const diff = state.deadline - now;
            const display = document.getElementById('countdownDisplay');
            const banner = document.getElementById('deadlineBanner');

            if (diff <= 0) {
                display.innerText = "00:00:00 - OVERDUE";
                banner.className = "bg-red-600/90 text-white rounded-2xl p-4 flex justify-between items-center shadow-lg pulse-red backdrop-blur-md";
                return;
            }

            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            display.innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

            const totalMins = diff / 60000;
            if (totalMins <= 1 && !state.warningsTriggered.m1) triggerWarning('m1', 'bg-red-500/90');
            else if (totalMins <= 5 && !state.warningsTriggered.m5) triggerWarning('m5', 'bg-red-500/90');
            else if (totalMins <= 15 && !state.warningsTriggered.m15) triggerWarning('m15', 'bg-orange-500/90');
            else if (totalMins <= 30 && !state.warningsTriggered.m30) triggerWarning('m30', 'bg-amber-500/90 text-amber-950');
        }

        function triggerWarning(flag, colorClass) {
            state.warningsTriggered[flag] = true;
            playSound('warning');
            document.getElementById('deadlineBanner').className = `${colorClass} backdrop-blur-md rounded-2xl p-4 flex justify-between items-center shadow-lg transition-colors duration-500 text-white`;
            saveState();
        }

        function populateDropdowns() {
            const startSelect = document.getElementById('rangeStart');
            const endSelect = document.getElementById('rangeEnd');
            for (let i = 0; i <= 1000; i++) {
                startSelect.add(new Option(i, i)); endSelect.add(new Option(i, i));
            }
            startSelect.value = "0"; endSelect.value = "10";
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.theme = isDark ? 'dark' : 'light';
        }

        function showSetup() {
            document.getElementById('setupView').classList.remove('hidden');
            document.getElementById('appView').classList.add('hidden');
        }

        function showApp() {
            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('appView').classList.remove('hidden');
            renderList();
        }

        function initializeProject() {
            initAudio(); 
            const start = parseInt(document.getElementById('rangeStart').value);
            const end = parseInt(document.getElementById('rangeEnd').value);
            const timeVal = document.getElementById('deadlineTime').value;
            
            if (isNaN(start) || isNaN(end) || end < start) { alert("Invalid range."); return; }
            if (!timeVal) { alert("Please set a deadline time."); return; }

            const now = new Date();
            const [hours, minutes] = timeVal.split(':');
            const deadlineDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes, 0);
            if (deadlineDate.getTime() < now.getTime()) deadlineDate.setDate(deadlineDate.getDate() + 1);

            state.deadline = deadlineDate.getTime();
            state.warningsTriggered = { m30: false, m15: false, m5: false, m1: false };
            state.total = (end - start) + 1;
            state.files = [];
            for(let i = start; i <= end; i++) {
                state.files.push({
                    id: i, name: `File_${String(i).padStart(3, '0')}`, status: 'not-yet',
                    t_val_start: null, t_val_end: null, t_up_start: null, t_up_end: null, dur_val: 0, dur_up: 0
                });
            }
            saveState(); startTimer(); showApp();
        }

        function updateStatus(id, newStatus) {
            initAudio(); 
            const file = state.files.find(f => f.id === id);
            if (!file) return;
            const now = Date.now();
            
            if (newStatus === 'validate-start') file.t_val_start = now;
            else if (newStatus === 'validated') {
                file.t_val_end = now;
                if (file.t_val_start) file.dur_val = now - file.t_val_start;
            } else if (newStatus === 'upload-start') file.t_up_start = now;
            else if (newStatus === 'upload-completed') {
                file.t_up_end = now;
                if (file.t_up_start) file.dur_up = now - file.t_up_start;
                playSound('success'); 
            }
            
            file.status = newStatus;
            saveState(); renderList();
        }

        function formatStatusText(s) { return s.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' '); }

        function renderList() {
            const container = document.getElementById('fileListContainer');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = '';
            let totalVal = 0, vCount = 0, totalUp = 0, uCount = 0, done = 0;

            state.files.forEach(file => {
                const isCompleted = file.status === 'upload-completed';
                if (isCompleted) done++;
                if (file.dur_val > 0) { totalVal += file.dur_val; vCount++; }
                if (file.dur_up > 0) { totalUp += file.dur_up; uCount++; }

                if (file.name.toLowerCase().includes(searchTerm)) {
                    const row = document.createElement('div');
                    row.className = `glass-panel p-4 md:p-5 rounded-3xl shadow-sm flex flex-row items-center justify-between gap-4 transition-all duration-300 hover:shadow-md`;
                    const nameClass = isCompleted 
                        ? 'font-bold text-[15px] text-emerald-500 line-through decoration-emerald-500/50 opacity-80 name-transition'
                        : 'font-bold text-[15px] text-slate-900 dark:text-white name-transition';

                    row.innerHTML = `
                        <div class="flex items-center"><span class="${nameClass}">${file.name}</span></div>
                        <div class="relative min-w-[160px] md:min-w-[180px]">
                            <select onchange="updateStatus(${file.id}, this.value)" class="${getDropdownStyle(file.status)} w-full appearance-none pr-8 pl-4 py-2.5 rounded-xl text-[12px] md:text-[13px] font-bold outline-none transition-all cursor-pointer border shadow-sm">
                                ${statuses.map(s => `<option value="${s}" ${file.status === s ? 'selected' : ''}>${formatStatusText(s)}</option>`).join('')}
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 ${getIconColor(file.status)}">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    `;
                    container.appendChild(row);
                }
            });

            document.getElementById('avg-val').innerText = vCount > 0 ? (totalVal/vCount/1000).toFixed(1) + 's' : '0s';
            document.getElementById('avg-up').innerText = uCount > 0 ? (totalUp/uCount/1000).toFixed(1) + 's' : '0s';

            const percent = Math.round((done / state.total) * 100) || 0;
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').innerText = percent + '%';
            
            if(percent === 100) {
                document.getElementById('progressText').classList.replace('text-blue-500', 'text-emerald-400');
                document.getElementById('progressBar').classList.replace('bg-blue-500', 'bg-emerald-500');
                if(timerInterval) clearInterval(timerInterval);
                document.getElementById('deadlineBanner').className = "bg-emerald-500/90 backdrop-blur-md text-white rounded-2xl p-4 flex justify-between items-center shadow-lg transition-colors duration-500";
                document.getElementById('countdownDisplay').innerText = "BATCH COMPLETE";
            }
        }

        function getDropdownStyle(s) {
            if (s === 'not-yet') return 'bg-white/50 dark:bg-slate-800/80 text-slate-600 dark:text-slate-300 border-white/50 dark:border-slate-700 backdrop-blur-md';
            if (s === 'validate-start') return 'bg-white/90 dark:bg-slate-800/90 text-amber-600 border-amber-300 dark:border-slate-600 backdrop-blur-md';
            if (s === 'validated') return 'bg-amber-500/90 text-white border-transparent backdrop-blur-md';
            if (s === 'upload-start') return 'bg-white/90 dark:bg-slate-800/90 text-blue-600 border-blue-300 dark:border-slate-600 backdrop-blur-md';
            if (s === 'upload-completed') return 'bg-emerald-500/90 text-white border-transparent backdrop-blur-md';
        }

        function getIconColor(s) {
            if (s === 'validated' || s === 'upload-completed') return 'text-white opacity-90';
            if (s === 'not-yet') return 'text-slate-500 dark:text-slate-400';
            return s === 'validate-start' ? 'text-amber-500' : 'text-blue-500';
        }

        function saveState() { localStorage.setItem('fileFlowCurrent_v11', JSON.stringify(state)); }

        function copyData() {
            let str = "Name\tStatus\tVal_Time_Sec\tUp_Time_Sec\n";
            state.files.forEach(f => str += `${f.name}\t${formatStatusText(f.status)}\t${(f.dur_val/1000).toFixed(2)}\t${(f.dur_up/1000).toFixed(2)}\n`);
            navigator.clipboard.writeText(str).then(() => {
                const toast = document.getElementById('copyToast');
                toast.classList.remove('opacity-0'); setTimeout(() => toast.classList.add('opacity-0'), 2000);
            });
        }

        function exportData() {
            let csv = "Name,Status,Val_Time_Sec,Up_Time_Sec\n";
            state.files.forEach(f => csv += `${f.name},${f.status},${(f.dur_val/1000).toFixed(2)},${(f.dur_up/1000).toFixed(2)}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a'); a.href = window.URL.createObjectURL(blob); a.download = `Batch_Report_${Date.now()}.csv`; a.click();
        }

        function resetApp() {
            if (confirm("Reset current sequence and deadline?")) { localStorage.removeItem('fileFlowCurrent_v11'); location.reload(); }
        }
    </script>
</body>
</html>
